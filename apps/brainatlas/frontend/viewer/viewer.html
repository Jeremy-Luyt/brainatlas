<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>BrainAtlas · 三维脑图谱浏览器</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/static/brainatlas-logo.png" type="image/png" />
  <style>
    :root {
      --bg-main: #020617;
      --bg-panel: #020617;
      --bg-panel-soft: #020617;
      --border-soft: #1f2937;
      --accent: #22d3ee;
      --accent-2: #a855f7;
      --accent-3: #22c55e;
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --danger: #fb7185;
      --radius-lg: 18px;
      --shadow-soft: 0 18px 45px rgba(0,0,0,0.7);
      --transition-fast: 150ms ease-out;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 0% 0%, rgba(56,189,248,0.18), transparent 45%),
        radial-gradient(circle at 100% 100%, rgba(129,140,248,0.25), transparent 55%),
        radial-gradient(circle at 50% 110%, rgba(34,197,94,0.22), transparent 60%),
        #020617;
      color: var(--text-main);
      font-family: -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
      overflow: hidden;
    }
    .layout {
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr) 300px;
      grid-template-rows: 100vh;
      gap: 12px;
      padding: 14px 14px 14px;
    }
    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: auto 60vh auto;
      }
    }
    .panel {
      background: radial-gradient(circle at 0 0, rgba(56,189,248,0.12), transparent 60%),
                  linear-gradient(145deg, rgba(15,23,42,0.98), rgba(2,6,23,0.98));
      border-radius: var(--radius-lg);
      border: 1px solid rgba(30,64,175,0.85);
      box-shadow: var(--shadow-soft);
      padding: 14px 14px 12px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .panel-title {
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-subtitle {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .panel-body {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
    }
    .field-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .field-group {
      margin-bottom: 10px;
    }

    .viewer-panel {
      padding: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .viewer-header {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(15,23,42,0.96);
      background: linear-gradient(90deg, rgba(15,23,42,0.96), rgba(8,47,73,0.96));
      position: relative;
      z-index: 2;
    }
    .viewer-title {
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .viewer-main {
      position: relative;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      background: #000;
      min-height: 0; /* 关键：允许 flex 子元素缩小 */
    }
    
    #niivue-container {
      flex: 1 1 auto; /* 占据剩余空间 */
      position: relative;
      width: 100%;
      min-height: 300px; /* 保证 NiiVue 有最小高度 */
    }
    #canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .slice-controls {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(15,23,42,0.85);
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 10;
      width: 180px;
    }
    .control-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .control-header {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
    }
    .slider {
      width: 100%;
      height: 4px;
      background: var(--border-soft);
      border-radius: 2px;
      outline: none;
      -webkit-appearance: none;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px var(--accent);
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      padding: 10px;
      background: rgba(15,23,42,0.8);
      border-top: 1px solid var(--border-soft);
      flex: 0 0 120px; /* 固定高度，不缩放 */
    }
    .preview-item {
      height: 100px;
      border: 1px solid var(--border-soft);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      background: #000;
    }
    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* 改为 contain 避免裁剪 */
      display: block;
    }
    .preview-label {
      position: absolute;
      top: 2px;
      left: 4px;
      font-size: 9px;
      color: #fff;
      text-shadow: 0 0 2px #000;
      background: rgba(0,0,0,0.4);
      padding: 1px 3px;
      border-radius: 3px;
    }

    .info-panel {
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .info-section {
      padding: 12px;
      border-radius: 12px;
      background: rgba(15,23,42,0.98);
      border: 1px solid var(--border-soft);
    }
    .info-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--accent);
      border-bottom: 1px solid var(--border-soft);
      padding-bottom: 4px;
    }
    .info-item {
      margin-bottom: 6px;
    }
    .info-label {
      font-size: 11px;
      color: var(--text-muted);
    }
    .info-value {
      font-size: 12px;
      word-break: break-all;
    }

    .btn {
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.7);
      background: rgba(15,23,42,0.96);
      color: var(--text-main);
      font-size: 11px;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="layout">
    <!-- 左侧面板：控制与检索 -->
    <section class="panel">
      <div class="panel-header">
        <div class="panel-title"><span>🔍</span> 视图控制</div>
      </div>
      <div class="panel-body">
        <div class="field-group">
          <div class="field-label">显示模式</div>
          <select id="viewMode">
            <option value="0">Axial (轴状面)</option>
            <option value="1">Coronal (冠状面)</option>
            <option value="2">Sagittal (矢状面)</option>
            <option value="3">Multi-Planar (多平面)</option>
            <option value="4">3D Render (三维渲染)</option>
          </select>
        </div>
        <div class="field-group">
          <div class="field-label">颜色映射</div>
          <select id="colorMap">
            <option value="gray">Gray (灰度)</option>
            <option value="red">Red</option>
            <option value="green">Green</option>
            <option value="blue">Blue</option>
            <option value="hot">Hot</option>
            <option value="jet">Jet</option>
          </select>
        </div>
        <div class="field-group">
          <div class="field-label">交互提示</div>
          <div style="font-size:11px; color:var(--text-muted); line-height:1.4;">
            - 鼠标左键：切换切片<br/>
            - 鼠标右键：调节亮度和对比度<br/>
            - 滚轮：缩放<br/>
            - V 键：循环切换显示模式
          </div>
        </div>
      </div>
    </section>

    <!-- 中间面板：NiiVue 主视图 -->
    <section class="viewer-panel panel">
      <div class="viewer-header">
        <div class="viewer-title">
          <img src="/static/brainatlas-logo.png" alt="logo" style="width:20px;height:20px;" />
          <span id="header-sample-id">BrainAtlas Viewer</span>
        </div>
        <div class="viewer-header-right">
          <button id="reset-view" class="btn">重置视角</button>
        </div>
      </div>
      
      <div class="viewer-main">
        <div id="niivue-container">
          <canvas id="canvas"></canvas>
          
          <!-- 切片控制滑块 -->
          <div class="slice-controls" id="slice-controls">
            <div class="control-item">
              <div class="control-header"><span>X Slice</span><span id="x-val">0</span></div>
              <input type="range" class="slider" id="x-slider" min="0" max="100" value="50">
            </div>
            <div class="control-item">
              <div class="control-header"><span>Y Slice</span><span id="y-val">0</span></div>
              <input type="range" class="slider" id="y-slider" min="0" max="100" value="50">
            </div>
            <div class="control-item">
              <div class="control-header"><span>Z Slice</span><span id="z-val">0</span></div>
              <input type="range" class="slider" id="z-slider" min="0" max="100" value="50">
            </div>
          </div>
        </div>

        <!-- 底部预览图层 -->
        <div class="preview-grid">
          <div class="preview-item"><span class="preview-label">XY</span><img id="prev-xy" src="" alt=""></div>
          <div class="preview-item"><span class="preview-label">XZ</span><img id="prev-xz" src="" alt=""></div>
          <div class="preview-item"><span class="preview-label">YZ</span><img id="prev-yz" src="" alt=""></div>
          <div class="preview-item"><span class="preview-label">MIP XY</span><img id="prev-mip-xy" src="" alt=""></div>
          <div class="preview-item"><span class="preview-label">MIP XZ</span><img id="prev-mip-xz" src="" alt=""></div>
          <div class="preview-item"><span class="preview-label">MIP YZ</span><img id="prev-mip-yz" src="" alt=""></div>
        </div>
      </div>
    </section>

    <!-- 右侧面板：样本详情 -->
    <section class="panel">
      <div class="panel-header">
        <div class="panel-title"><span>📊</span> 样本详情</div>
      </div>
      <div class="info-panel">
        <div class="info-section">
          <div class="info-title">基本信息</div>
          <div class="info-item">
            <div class="info-label">Sample ID</div>
            <div class="info-value" id="info-id">-</div>
          </div>
          <div class="info-item">
            <div class="info-label">Filename</div>
            <div class="info-value" id="info-filename">-</div>
          </div>
        </div>
        
        <div class="info-section">
          <div class="info-title">数据统计</div>
          <div class="info-item">
            <div class="info-label">Shape (Z, Y, X)</div>
            <div class="info-value" id="info-shape">-</div>
          </div>
          <div class="info-item">
            <div class="info-label">DType / Range</div>
            <div class="info-value" id="info-range">-</div>
          </div>
          <div class="info-item">
            <div class="info-label">Mean Intensity</div>
            <div class="info-value" id="info-mean">-</div>
          </div>
        </div>

        <div class="info-section">
          <div class="info-title">任务状态</div>
          <div class="info-item">
            <div class="info-label">Prepare Status</div>
            <div class="info-value" id="info-prepare">-</div>
          </div>
          <div class="info-item">
            <div class="info-label">Registration</div>
            <div class="info-value" id="info-reg">-</div>
          </div>
        </div>

        <div style="margin-top:10px; display:flex; gap:8px;">
          <button id="refresh-btn" class="btn btn-primary" style="flex:1;">刷新数据</button>
        </div>
      </div>
    </section>
  </div>

  <!-- NiiVue 脚本，使用更稳定的 jsdelivr CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@niivue/niivue@latest/dist/niivue.umd.js"></script>
  <script>
    const query = new URLSearchParams(window.location.search);
    const sampleId = query.get("sample_id");
    
    // 初始化 NiiVue
    const nv = new niivue.Niivue({
      loadingText: '正在加载体数据...',
      backColor: [0, 0, 0, 1],
      show3Dcrosshair: true,
      onLocationChange: handleLocationChange
    });
    // 确保 canvas 关联正确
    nv.attachTo('canvas');

    // UI 元素
    const xSlider = document.getElementById('x-slider');
    const ySlider = document.getElementById('y-slider');
    const zSlider = document.getElementById('z-slider');
    const xVal = document.getElementById('x-val');
    const yVal = document.getElementById('y-val');
    const zVal = document.getElementById('z-val');

    function handleLocationChange(data) {
      // 当在 NiiVue 中点击切换切片时，同步更新滑块
      const vox = data.vox; // [x, y, z]
      if (!vox || vox.length < 3) return;
      
      xSlider.value = vox[0];
      ySlider.value = vox[1];
      zSlider.value = vox[2];
      xVal.textContent = vox[0];
      yVal.textContent = vox[1];
      zVal.textContent = vox[2];
    }

    // 滑块事件
    [xSlider, ySlider, zSlider].forEach((s, idx) => {
      s.addEventListener('input', () => {
        const vox = [
          parseInt(xSlider.value),
          parseInt(ySlider.value),
          parseInt(zSlider.value)
        ];
        // 同步 NiiVue
        nv.scene.crosshairPos = nv.vox2frac(vox);
        nv.drawScene();
        
        xVal.textContent = xSlider.value;
        yVal.textContent = ySlider.value;
        zVal.textContent = zSlider.value;
      });
    });

    // 视图模式切换
    document.getElementById('viewMode').addEventListener('change', (e) => {
      nv.setSliceType(parseInt(e.target.value));
    });

    // 颜色映射切换
    document.getElementById('colorMap').addEventListener('change', (e) => {
      if (nv.volumes && nv.volumes.length > 0) {
        nv.volumes[0].colormap = e.target.value;
        nv.updateGLVolume();
      }
    });

    document.getElementById('reset-view').addEventListener('click', () => {
      nv.setSliceType(niivue.SLICE_TYPE.MULTIPLANAR);
    });

    async function loadSample() {
      if (!sampleId) {
        console.warn("未指定 sample_id，请检查 URL 参数");
        return;
      }

      try {
        const resp = await fetch(`/api/samples/${sampleId}`);
        if (!resp.ok) throw new Error("无法获取样本信息");
        const sample = await resp.json();

        // 更新 UI 信息
        document.getElementById('header-sample-id').textContent = `Sample: ${sample.sample_id}`;
        document.getElementById('info-id').textContent = sample.sample_id;
        document.getElementById('info-filename').textContent = sample.filename;
        document.getElementById('info-prepare').textContent = sample.prepare_status;
        document.getElementById('info-reg').textContent = sample.global_registration_status;

        if (sample.stats) {
          document.getElementById('info-shape').textContent = sample.stats.shape.join(' × ');
          document.getElementById('info-range').textContent = `${sample.stats.dtype} (${sample.stats.min} - ${sample.stats.max})`;
          document.getElementById('info-mean').textContent = parseFloat(sample.stats.mean).toFixed(2);
        }

        // 加载预览图
        if (sample.preview && sample.preview.preview_urls) {
          const urls = sample.preview.preview_urls;
          // 确保 URL 是正确的
          document.getElementById('prev-xy').src = urls.xy || '';
          document.getElementById('prev-xz').src = urls.xz || '';
          document.getElementById('prev-yz').src = urls.yz || '';
          document.getElementById('prev-mip-xy').src = urls.mip_xy || '';
          document.getElementById('prev-mip-xz').src = urls.mip_xz || '';
          document.getElementById('prev-mip-yz').src = urls.mip_yz || '';
          console.log("PNG 预览图已加载:", urls);
        }

        // 加载 NIfTI
        if (sample.converted && sample.converted.nii_url) {
          console.log("正在通过 NiiVue 加载体数据:", sample.converted.nii_url);
          const volumeList = [
            {
              url: sample.converted.nii_url,
              colormap: "gray",
              opacity: 1,
              visible: true,
            }
          ];
          await nv.loadVolumes(volumeList);
          
          // 设置滑块范围
          if (nv.volumes && nv.volumes.length > 0) {
            const dims = nv.volumes[0].dims; // [?, x, y, z]
            xSlider.max = dims[1] - 1;
            ySlider.max = dims[2] - 1;
            zSlider.max = dims[3] - 1;
            
            // 初始位置设为中心
            const mid = [Math.floor(dims[1]/2), Math.floor(dims[2]/2), Math.floor(dims[3]/2)];
            nv.scene.crosshairPos = nv.vox2frac(mid);
            handleLocationChange({vox: mid});
          }
          
          nv.setSliceType(niivue.SLICE_TYPE.MULTIPLANAR);
        } else {
          console.warn("未找到 nii_url，无法加载体数据");
        }

      } catch (err) {
        console.error("加载样本数据失败:", err);
      }
    }

    document.getElementById('refresh-btn').addEventListener('click', loadSample);

    // 初始加载
    loadSample();
  </script>
</body>
</html>
